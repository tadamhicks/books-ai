apiVersion: v1
kind: Service
metadata:
  name: books-api
  namespace: books-ai
spec:
  selector:
    app: books-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-api
  namespace: books-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: books-api
  template:
    metadata:
      labels:
        app: books-api
    spec:
      containers:
        - name: api
          image: tadamhicks/books-ai-api:0.1.7
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: books-ai-secrets
                  key: database-url
            - name: AWS_BEARER_TOKEN_BEDROCK
              valueFrom:
                secretKeyRef:
                  name: books-ai-secrets
                  key: bedrock-api-key
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: books-ai-secrets
                  key: bedrock-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: books-ai-secrets
                  key: bedrock-secret-access-key
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: books-ai-secrets
                  key: bedrock-session-token
            - name: BEDROCK_REGION
              value: us-west-2
            - name: BEDROCK_MODEL_ID
              value: mistral.mistral-large-2402-v1:0
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: groundcover-sensor.groundcover.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15

