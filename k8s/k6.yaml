---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k6-load
  namespace: books-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k6-load
  template:
    metadata:
      labels:
        app: k6-load
    spec:
      containers:
        - name: k6
          image: grafana/k6:0.54.0
          args:
            - run
            - /scripts/load.js
          env:
            - name: BASE_URL
              value: http://books-api.books-ai.svc.cluster.local
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: k6-scripts
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k6-delete-hourly
  namespace: books-ai
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: k6-delete
              image: grafana/k6:0.54.0
              args:
                - run
                - /scripts/delete.js
              env:
                - name: BASE_URL
                  value: http://books-api.books-ai.svc.cluster.local
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: k6-scripts

